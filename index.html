<!DOCTYPE html>
<html>
<head>
    <title>Shreyash Dhanvijay</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            color: white;
            overflow-x: hidden;

            /* 🖼️ IMAGE BACKGROUND */
            background: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 🔥 Dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        /* 🔴 RED GAMER TITLE */
        h1 {
            color: #ff0000;
            font-size: 45px;
            text-shadow: 0 0 10px red, 0 0 20px red, 0 0 40px darkred;
            animation: glowRed 2s infinite alternate;
        }

        @keyframes glowRed {
            from { text-shadow: 0 0 10px red; }
            to { text-shadow: 0 0 30px red; }
        }

        .bio {
            font-style: italic;
            margin: 20px;
            color: #ccc;
        }

        /* 🔴 GAMER BUTTONS */
        a {
            color: white;
            background: #111;
            border: 1px solid red;
            padding: 12px 25px;
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        a:hover {
            background: red;
            color: black;
            box-shadow: 0 0 15px red;
            transform: scale(1.1);
        }

        .section {
            margin-top: 30px;
        }

        .profile {
            margin-top: 20px;
        }

        /* 🔴 RED PROFILE */
        .profile img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid red;
            box-shadow: 0 0 20px red, 0 0 40px darkred;
        }

        .discord-id {
            margin-top: 10px;
            font-weight: bold;
            color: red;
        }

    </style>
</head>
<body>

    <!-- 🔥 Overlay -->

    <!-- 🖼️ Profile -->
