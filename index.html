<!DOCTYPE html>
<html>
<head>
    <title>Shreyash Dhanvijay</title>

    <!-- 🎮 Gaming Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', Arial;
            text-align: center;
            color: white;
            overflow-x: hidden;

            background: url('bg.jpg');
            background-size: cover;

        /* 🔥 Loader */
        #loader {
            position: fixed;

            display: flex;

        }

        /* 🌌 Particles canvas */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        /* 🔥 Dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        /* 🔴 RED GAMER TITLE */
        h1 {
            color: #ff0000;
            font-size: 45px;
            text-shadow: 0 0 10px red, 0 0 20px red, 0 0 40px darkred;
            animation: glowRed 2s infinite alternate;
        }

        @keyframes glowRed {
            from { text-shadow: 0 0 10px red; }
            to { text-shadow: 0 0 30px red; }
        }

        .bio {
            font-style: italic;
            margin: 20px;
            color: #ccc;
            font-weight: bold;
        }

        a {
            color: white;
            background: #111;
            border: 1px solid red;
            padding: 12px 25px;
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        a:hover {
            background: red;
            color: black;
            box-shadow: 0 0 15px red;
            transform: scale(1.1);
        }

        .section {
            margin: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid red;
            border-radius: 15px;
            transition: 0.3s;
        }

        .section:hover {
            box-shadow: 0 0 20px red;
        }

        .profile {
            margin-top: 20px;
        }

        .profile img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid red;
            box-shadow: 0 0 20px red, 0 0 40px darkred;
        }

        .discord-id {
            margin-top: 10px;
            font-weight: bold;
            color: red;
        }

    </style>
</head>
<body>

<!-- 🔥 Loader -->
<div id="loader">Loading...</div>

<!-- 🌌 Particles -->
<canvas id="particles"></canvas>

<!-- 🎧 Music -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- 🔥 Overlay -->
<div class="overlay"></div>

<div class="profile">
    <img src="profile.jpg">
</div>

<h1>Shreyash Dhanvijay</h1>

<p class="bio">
"If to be truthful is to be cruel, then lying must surely be an act of kindness. And so, kindness is a lie."
</p>

<div class="section">
    <h2>📧 Contact</h2>
    <p>Email: shreyashdhanvijay11@gmail.com</p>
</div>

<div class="section">
    <h2>🌐 Social Links</h2>
    <a href="https://www.instagram.com/_cursed_shreyash_" target="_blank">Instagram</a>
    <a href="https://discord.gg/dtPna9QU" target="_blank">Discord Profile</a>
    <a href="https://discord.gg/eV4qq9BB" target="_blank">Discord Server</a>

<!-- 🔥 Loader Script -->
<script>
window.onload = function() {
    document.getElementById("loader").style.display = "none";
}
</script>

<!-- 🌌 Particle Script -->
<script>
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "red";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += 0.5;
        if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

<!-- 🔥 Click Effect (UNCHANGED) -->
<script>
document.addEventListener("click", function(e) {
    let circle = document.createElement("div");
    circle.style.position = "fixed";
    circle.style.width = "10px";
    circle.style.height = "10px";
    circle.style.background = "red";
    circle.style.borderRadius = "50%";
    circle.style.left = e.clientX + "px";
    circle.style.top = e.clientY + "px";
    circle.style.boxShadow = "0 0 20px red";
    document.body.appendChild(circle);

    setTimeout(() => circle.remove(), 500);
});
</script>

</body>
