<!DOCTYPE html>
<html>
<head>
    <title>Shreyash Dhanvijay</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            color: white;
            overflow-x: hidden;

            /* 🖼️ IMAGE BACKGROUND */
            background: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 🔥 Dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        /* 🔴 RED GAMER TITLE */
        h1 {
            color: #ff0000;
            font-size: 45px;
            text-shadow: 0 0 10px red, 0 0 20px red, 0 0 40px darkred;
            animation: glowRed 2s infinite alternate;
        }

        @keyframes glowRed {
            from { text-shadow: 0 0 10px red; }
            to { text-shadow: 0 0 30px red; }
        }

        /* ✨ Typing text style */
        #typing {
            font-style: italic;
            margin: 20px;
            color: #ccc;
            font-size: 18px;
        }

        /* 🔴 GAMER BUTTONS */
        a {
            color: white;
            background: #111;
            border: 1px solid red;
            padding: 12px 25px;
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        a:hover {
            background: red;
            color: black;
            box-shadow: 0 0 15px red;
            transform: scale(1.1);
        }

        /* 🧱 Hover cards */
        .section {
            margin: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid red;
            border-radius: 15px;
            transition: 0.3s;
        }

        .section:hover {
            box-shadow: 0 0 20px red;
        }

        .profile {
            margin-top: 20px;
        }

        /* 🔴 RED PROFILE */
        .profile img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid red;
            box-shadow: 0 0 20px red, 0 0 40px darkred;
        }

        .discord-id {
            margin-top: 10px;
            font-weight: bold;
            color: red;
        }

    </style>
</head>
<body>

    <!-- 🔥 Overlay -->
    <div class="overlay"></div>

    <!-- 🖼️ Profile -->
    <div class="profile">
        <img src="profile.jpg">
    </div>

    <h1>Shreyash Dhanvijay</h1>

    <!-- ✨ Typing Animation -->
    <p id="typing"></p>

    <div class="section">
        <h2>📧 Contact</h2>
        <p>Email: shreyashdhanvijay11@gmail.com</p>
    </div>

    <div class="section">
        <h2>🌐 Social Links</h2>
        <a href="https://www.instagram.com/_cursed_shreyash_?igsh=amNyb2J2YXNuMmVn" target="_blank">Instagram</a>
        <a href="https://discord.gg/dtPna9QU" target="_blank">Discord Profile</a>
        <a href="https://discord.gg/eV4qq9BB" target="_blank">Discord Server</a>

        <p class="discord-id">Discord ID: ishowshrey</p>
    </div>

    <!-- ✨ Typing Script -->
    <script>
    let text = ["Gamer", "Content Creator", "Anime Lover"];
    let i = 0, j = 0;
    let currentText = "";
    let isDeleting = false;

    function type() {
        if (i < text.length) {
            if (!isDeleting && j <= text[i].length) {
                currentText = text[i].substring(0, j++);
            } else if (isDeleting && j >= 0) {
                currentText = text[i].substring(0, j--);
            }

            document.getElementById("typing").innerHTML = currentText;

            if (j == text[i].length) isDeleting = true;
            if (j == 0) { isDeleting = false; i++; }

            setTimeout(type, isDeleting ? 50 : 100);
        } else {
            i = 0;
            setTimeout(type, 500);
        }
    }
    type();
    </script>

    <!-- 🔥 Click Effect -->
    <script>
    document.addEventListener("click", function(e) {
        let circle = document.createElement("div");
        circle.style.position = "fixed";
        circle.style.width = "10px";
        circle.style.height = "10px";
        circle.style.background = "red";
        circle.style.borderRadius = "50%";
        circle.style.left = e.clientX + "px";
        circle.style.top = e.clientY + "px";
        circle.style.boxShadow = "0 0 20px red";
        document.body.appendChild(circle);

        setTimeout(() => circle.remove(), 500);
    });
    </script>

</body>
</html>
