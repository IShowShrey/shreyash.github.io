<!DOCTYPE html>
<html>
<head>
    <title>Shreyash Dhanvijay</title>

    <!-- 🎮 Gaming Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: white;
            overflow-x: hidden;

            background: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 🔥 Loader */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            font-size: 30px;
            color: red;
        }

        /* 🔥 Overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: -1;
        }

        /* 🌌 Particles */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        h1 {
            color: red;
            font-size: 45px;
            text-shadow: 0 0 20px red;
        }

        /* 🧠 Quote */
        .quote {
            font-weight: bold;
            font-size: 18px;
            margin: 20px;
        }

        a {
            color: white;
            background: #111;
            border: 1px solid red;
            padding: 12px 25px;
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        a:hover {
            background: red;
            color: black;
            box-shadow: 0 0 15px red;
        }

        .section {
            margin: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid red;
            border-radius: 15px;
        }

        .profile img {
            width: 140px;
            border-radius: 50%;
            border: 3px solid red;
            box-shadow: 0 0 20px red;
        }

    </style>
</head>
<body>

<!-- 🔥 Loader -->
<div id="loader">Loading...</div>

<!-- 🌌 Particles -->
<canvas id="particles"></canvas>

<!-- 🔥 Overlay -->
<div class="overlay"></div>

<!-- 🎧 Music -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<div class="profile">
    <img src="profile.jpg">
</div>

<h1>Shreyash Dhanvijay</h1>

<p class="quote">
"If to be truthful is to be cruel, then lying must surely be an act of kindness. And so, kindness is a lie."
</p>

<div class="section">
    <h2>Contact</h2>
    <p>shreyashdhanvijay11@gmail.com</p>
</div>

<div class="section">
    <h2>Social</h2>
    <a href="https://www.instagram.com/_cursed_shreyash_">Instagram</a>
    <a href="https://discord.gg/dtPna9QU">Discord</a>
</div>

<!-- 🔥 Loader Script -->
<script>
window.onload = function() {
    document.getElementById("loader").style.display = "none";
}
</script>

<!-- 🌌 Particle Script -->
<script>
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "red";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += 0.5;
        if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
